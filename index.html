<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulut Sayım v24 - Akıllı Silme</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4834d4; --success: #22a6b3; --danger: #eb4d4b; --warning: #f9ca24; --dark: #2d3436; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .scan-overlay { position: relative; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; min-height: 200px; }
        #reader { width: 100%; }
        #torchBtn { position: absolute; top: 10px; right: 10px; z-index: 100; background: rgba(0,0,0,0.6); border: 1px solid white; color: white; padding: 10px; border-radius: 50%; cursor: pointer; display: none; font-size: 18px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: bold; color: #636e72; margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-add { background: var(--primary); }
        .btn-undo { background: var(--warning); color: #856404; font-size: 14px; margin-top: 5px; }
        .btn-camera { background: #636e72; font-size: 14px; }
        
        #memoryAlert { display: none; background: #fff9db; border: 1px solid var(--warning); color: #856404; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
        
        .history { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .history h4 { margin: 0 0 10px 0; font-size: 13px; color: #b2bec3; text-transform: uppercase; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th { text-align: left; color: #b2bec3; padding-bottom: 8px; }
        td { padding: 10px 0; border-bottom: 1px solid #f1f2f6; }
    </style>
</head>
<body>

<div class="container">
    <div class="scan-overlay">
        <div id="reader"></div>
        <button id="torchBtn" onclick="toggleTorch()">🔦</button>
    </div>
    
    <button class="btn btn-camera" id="camBtn" onclick="toggleCamera()">📷 KAMERAYI AÇ</button>
    
    <div id="memoryAlert"></div>

    <div class="input-row">
        <div class="input-group" style="flex: 2;">
            <label>📍 RAF KONUMU</label>
            <input type="text" id="shelf" placeholder="A-01" autocomplete="off">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>🔢 ADET</label>
            <input type="number" id="count" value="1" min="1">
        </div>
    </div>

    <div class="input-group" style="margin-bottom: 12px;">
        <label>🏷️ BARKOD</label>
        <input type="text" id="barcode" placeholder="Barkod okutun..." oninput="checkInput()">
    </div>
    
    <button class="btn btn-add" id="addBtn" onclick="processEntry()" disabled style="opacity: 0.5;">➕ LİSTEYE EKLE VE GÖNDER</button>
    <button class="btn btn-undo" id="undoBtn" onclick="undoLastEntry()" style="display: none;">↩️ SON KAYDI TABLODAN SİL</button>

    <div class="history">
        <h4>🕒 SON 5 İŞLEM</h4>
        <table>
            <thead>
                <tr><th>Raf</th><th>Barkod</th><th>Adet</th><th>Durum</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyU_uvD1L_anysK2CAgn-7GyR33XRiCcwpjTNsPZO6BZ1Ij-CDi3a8H_n7eou1-2L6B/exec'; // <--- Yeni Deployment URL'nizi buraya yapıştırın
    let localData = JSON.parse(localStorage.getItem('cloud_sayim_v24')) || [];
    let html5QrCode;
    let isCameraOpen = false;
    let isPaused = false;
    let torchActive = false;

    window.onload = () => {
        const lastShelf = localStorage.getItem('last_shelf');
        if(lastShelf) document.getElementById('shelf').value = lastShelf;
        updateUI();
    };

    function checkInput() {
        const barcodeVal = document.getElementById('barcode').value.trim();
        const alertBox = document.getElementById('memoryAlert');
        
        if(barcodeVal.length > 2) {
            const prev = localData.find(item => item.barcode === barcodeVal);
            if(prev) {
                alertBox.style.display = "block";
                alertBox.innerHTML = `💡 Bu ürün daha önce <b>${prev.shelf}</b> rafına eklenmiş.`;
            } else { alertBox.style.display = "none"; }
        }
        const addBtn = document.getElementById('addBtn');
        addBtn.disabled = barcodeVal.length === 0;
        addBtn.style.opacity = barcodeVal.length === 0 ? "0.5" : "1";
    }

    function toggleCamera() {
        if (!isCameraOpen) {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 280, height: 150 }, aspectRatio: 1.0 };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                isCameraOpen = true;
                document.getElementById('camBtn').innerText = "📷 KAMERAYI KAPAT";
                setTimeout(() => {
                    try {
                        const track = html5QrCode.getRunningTrack();
                        if (track && track.getCapabilities().torch) document.getElementById('torchBtn').style.display = 'block';
                    } catch (e) {}
                }, 500);
            }).catch(err => alert("Kamera hatası: " + err));
        } else {
            html5QrCode.stop().then(() => {
                isCameraOpen = false;
                document.getElementById('camBtn').innerText = "📷 KAMERAYI AÇ";
                document.getElementById('torchBtn').style.display = 'none';
                document.getElementById("reader").innerHTML = "";
            });
        }
    }

    function toggleTorch() {
        try {
            torchActive = !torchActive;
            html5QrCode.applyVideoConstraints({ advanced: [{ torch: torchActive }] });
            document.getElementById('torchBtn').innerText = torchActive ? '🔆' : '🔦';
        } catch (e) {}
    }

    function onScanSuccess(decodedText) {
        if (isPaused) return;
        isPaused = true;
        html5QrCode.pause();
        document.getElementById('barcode').value = decodedText;
        checkInput();
        playBeep(1000);
    }

    function processEntry() {
        const shelf = document.getElementById('shelf').value.trim() || "Genel";
        const barcode = document.getElementById('barcode').value.trim();
        const count = document.getElementById('count').value || 1;
        const timestamp = Date.now(); // Kimlik numarası

        localStorage.setItem('last_shelf', shelf);
        const entry = { shelf, barcode, count, timestamp, synced: false, action: "ADD" };
        
        localData.unshift(entry); 
        save();
        
        if(navigator.onLine) sendToCloud(entry, 0);
        
        document.getElementById('barcode').value = "";
        document.getElementById('count').value = 1;
        checkInput();
        updateUI();

        if (isCameraOpen) { isPaused = false; html5QrCode.resume(); }
    }

    function undoLastEntry() {
        if (localData.length === 0) return;
        const lastEntry = localData[0];
        
        if (confirm(`${lastEntry.barcode} barkodlu kaydı tablodan SİLMEK istediğinize emin misiniz?`)) {
            if (navigator.onLine) {
                fetch(CLOUD_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: "DELETE", barcode: lastEntry.barcode, timestamp: lastEntry.timestamp }) 
                });
            }
            localData.shift(); 
            save();
            updateUI();
            alert("İşlem geri alındı ve satır silindi.");
        }
    }

    async function sendToCloud(item, index) {
        try {
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
            localData[index].synced = true;
            save();
            updateUI();
        } catch (e) {}
    }

    function save() { localStorage.setItem('cloud_sayim_v24', JSON.stringify(localData)); }
    
    function updateUI() {
        const historyBody = document.getElementById('historyBody');
        const undoBtn = document.getElementById('undoBtn');
        historyBody.innerHTML = "";
        undoBtn.style.display = localData.length > 0 ? "block" : "none";

        localData.slice(0, 5).forEach(item => {
            const row = `<tr>
                <td>${item.shelf}</td>
                <td>${item.barcode}</td>
                <td>x${item.count}</td>
                <td style="color:${item.synced ? '#22a6b3':'#eb4d4b'}">${item.synced ? 'Bulutta':'Bekliyor'}</td>
            </tr>`;
            historyBody.innerHTML += row;
        });
    }

    function playBeep(freq) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; gain.gain.value = 0.05;
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }
</script>
</body>
</html>
