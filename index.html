<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulut Sayım v18 - Raf Hafızalı</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4834d4; --success: #22a6b3; --danger: #eb4d4b; --text: #2d3436; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #636e72; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        /* Sabit kalacak raf kutusu için özel stil */
        #shelf { background-color: #f1f2f6; border-color: var(--primary); font-weight: bold; }
        input:read-only { background-color: #fff; color: var(--success); font-weight: bold; border-color: var(--success); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-add { background: var(--primary); }
        .btn-camera { background: #636e72; font-size: 14px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #95afc0; margin-top: 10px; }
        .scan-overlay { position: relative; }
        #scanStatus { position: absolute; top: 10px; left: 10px; padding: 5px 10px; border-radius: 5px; color: white; font-size: 10px; font-weight: bold; z-index: 10; }
        .status-wait { background: var(--danger); }
        .status-active { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="scan-overlay">
        <div id="scanStatus" class="status-wait">KAMERA KAPALI</div>
        <div id="reader"></div>
    </div>
    
    <button class="btn btn-camera" id="camBtn" onclick="toggleCamera()">📷 KAMERAYI AÇ</button>
    
    <div class="input-group">
        <label>📍 RAF KONUMU (Değiştirene kadar sabit kalır)</label>
        <input type="text" id="shelf" placeholder="Raf girin (Örn: A-01)..." autocomplete="off">
    </div>

    <div class="input-group">
        <label>🏷️ OKUNAN BARKOD</label>
        <input type="text" id="barcode" placeholder="Barkod okutun..." readonly>
    </div>
    
    <button class="btn btn-add" id="addBtn" onclick="processEntry()" disabled style="opacity: 0.5;">➕ LİSTEYE EKLE VE GÖNDER</button>

    <div class="status-bar">
        <span id="stats">Kayıt: 0 | Bulut: 0</span>
        <span id="lastScanned" style="color: var(--success); font-weight: bold;"></span>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyhJ2SvVAlUu2u3Ycgz3ERJuAL49Qn9JULPwzJWQUXg2csRYzZpVuflSU28s7TmMJ81/exec'; // Kendi URL'nizi buraya yapıştırın
    let localData = JSON.parse(localStorage.getItem('cloud_sayim_v18')) || [];
    let html5QrCode;
    let isCameraOpen = false;
    let isPaused = false;

    // Sayfa açıldığında son kullanılan rafı hatırla
    window.onload = () => {
        const lastShelf = localStorage.getItem('last_shelf');
        if(lastShelf) document.getElementById('shelf').value = lastShelf;
        updateUI();
    };

    function toggleCamera() {
        if (!isCameraOpen) {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 280, height: 150 }, aspectRatio: 1.0 };
            const formats = [ 
                Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, 
                Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.UPC_A 
            ];

            html5QrCode.start({ facingMode: "environment" }, { ...config, formatsToSupport: formats }, onScanSuccess)
            .then(() => {
                isCameraOpen = true;
                document.getElementById('camBtn').innerText = "📷 KAMERAYI KAPAT";
                setScanStatus(true);
            }).catch(err => alert("Hata: " + err));
        } else {
            html5QrCode.stop().then(() => {
                isCameraOpen = false;
                isPaused = false;
                document.getElementById('camBtn').innerText = "📷 KAMERAYI AÇ";
                document.getElementById("reader").innerHTML = "";
                setScanStatus(false);
            });
        }
    }

    function onScanSuccess(decodedText) {
        if (isPaused) return;
        isPaused = true;
        html5QrCode.pause();
        setScanStatus(false, "ONAY BEKLENİYOR");
        document.getElementById('barcode').value = decodedText;
        document.getElementById('lastScanned').innerText = "✓ " + decodedText;
        const addBtn = document.getElementById('addBtn');
        addBtn.disabled = false;
        addBtn.style.opacity = "1";
        playBeep(1000);
    }

    function processEntry() {
        const shelfInput = document.getElementById('shelf');
        const shelf = shelfInput.value.trim() || "Genel";
        const barcode = document.getElementById('barcode').value.trim();
        if(!barcode) return;

        // Rafı hafızaya al
        localStorage.setItem('last_shelf', shelf);

        const entry = { shelf, barcode, count: 1, device: "Mobil" };
        localData.push({ ...entry, synced: false });
        save();
        
        if(navigator.onLine) sendToCloud(entry, localData.length - 1);
        
        // Sadece barkodu sıfırla, RAF KALSIN!
        document.getElementById('barcode').value = "";
        const addBtn = document.getElementById('addBtn');
        addBtn.disabled = true;
        addBtn.style.opacity = "0.5";
        
        updateUI();

        if (isCameraOpen) {
            isPaused = false;
            html5QrCode.resume();
            setScanStatus(true);
        }
    }

    function setScanStatus(active, message = "") {
        const statusEl = document.getElementById('scanStatus');
        if (active) {
            statusEl.innerText = "TARANIYOR...";
            statusEl.className = "status-active";
        } else {
            statusEl.innerText = message || "BEKLEMEDE";
            statusEl.className = "status-wait";
        }
    }

    async function sendToCloud(item, index) {
        try {
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
            localData[index].synced = true;
            save();
            updateUI();
        } catch (e) {}
    }

    function save() { localStorage.setItem('cloud_sayim_v18', JSON.stringify(localData)); }
    
    function updateUI() {
        const total = localData.length;
        const sent = localData.filter(i => i.synced).length;
        document.getElementById('stats').innerText = `Kayıt: ${total} | Bulut: ${sent}`;
    }

    function playBeep(freq) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; gain.gain.value = 0.05;
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }
</script>
</body>
</html>
