<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulut Sayım + Kamera v15</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4834d4; --success: #22a6b3; --warning: #f9ca24; --danger: #eb4d4b; --text: #2d3436; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* Kamera Alanı */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #636e72; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-add { background: var(--primary); }
        .btn-camera { background: #636e72; font-size: 14px; }
        .btn-sync { background: var(--success); display: none; }
        
        .status-bar { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #95afc0; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; background: #bbb; }
        .online-dot { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0;">📦 Bulut Sayım</h3>
        <div><span id="onlineDot" class="dot"></span> <small id="statusText">Çevrimdışı</small></div>
    </div>

    <div id="reader"></div>
    <button class="btn btn-camera" onclick="toggleCamera()">📷 KAMERAYI AÇ/KAPAT</button>
    
    <div class="input-group">
        <label>📍 RAF KONUMU</label>
        <input type="text" id="shelf" placeholder="Raf girin..." autocomplete="off">
    </div>

    <div class="input-group">
        <label>🏷️ BARKOD</label>
        <input type="text" id="barcode" placeholder="Manuel giriş veya okutma">
    </div>
    
    <button class="btn btn-add" onclick="processEntry()">➕ EKLE VE GÖNDER</button>
    <button id="syncBtn" class="btn btn-sync" onclick="syncOfflineData()">🔄 İNTERNET GELDİ - VERİLERİ GÖNDER</button>

    <div class="status-bar">
        <span id="stats">Kayıt: 0 | Bulut: 0</span>
        <span id="lastScanned" style="color: var(--success); font-weight: bold;"></span>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyhJ2SvVAlUu2u3Ycgz3ERJuAL49Qn9JULPwzJWQUXg2csRYzZpVuflSU28s7TmMJ81/exec'; // <--- Apps Script'ten aldığın linki buraya yapıştır!
    let localData = JSON.parse(localStorage.getItem('cloud_sayim_v15')) || [];
    let html5QrCode;
    let isCameraOpen = false;

    // --- KAMERA FONKSİYONLARI ---
    function toggleCamera() {
        if (!isCameraOpen) {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => isCameraOpen = true)
            .catch(err => alert("Kamera hatası: " + err));
        } else {
            html5QrCode.stop().then(() => {
                isCameraOpen = false;
                document.getElementById("reader").innerHTML = "";
            });
        }
    }

    function onScanSuccess(decodedText) {
        document.getElementById('barcode').value = decodedText;
        document.getElementById('lastScanned').innerText = "Okundu: " + decodedText;
        
        // Bip sesi (isteğe bağlı)
        playBeep(880);
        
        // Otomatik ekle (Opsiyonel: Eğer okutur okutmaz gitsin dersen alttaki satırı aç)
        // processEntry(); 
    }

    // --- VERİ YÖNETİMİ ---
    function processEntry() {
        const shelf = document.getElementById('shelf').value.trim() || "Genel";
        const barcode = document.getElementById('barcode').value.trim();
        if(!barcode) return;

        const entry = { 
            shelf: shelf, 
            barcode: barcode, 
            count: 1, 
            device: navigator.platform 
        };
        
        localData.push({ ...entry, synced: false });
        save();
        
        if(navigator.onLine) { sendToCloud(entry, localData.length - 1); }
        
        document.getElementById('barcode').value = "";
        updateUI();
    }

    async function sendToCloud(item, index) {
        try {
            await fetch(CLOUD_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(item)
            });
            localData[index].synced = true;
            save();
            updateUI();
        } catch (e) { console.log("Hata:", e); }
    }

    // --- YARDIMCI ARAÇLAR ---
    function updateStatus() {
        const dot = document.getElementById('onlineDot');
        const txt = document.getElementById('statusText');
        if(navigator.onLine) { 
            dot.classList.add('online-dot'); 
            txt.innerText = "Çevrimiçi";
            syncOfflineData(); 
        } else { 
            dot.classList.remove('online-dot'); 
            txt.innerText = "Çevrimdışı";
        }
    }

    function syncOfflineData() {
        localData.forEach((item, index) => {
            if(!item.synced) sendToCloud(item, index);
        });
    }

    function save() { localStorage.setItem('cloud_sayim_v15', JSON.stringify(localData)); }
    
    function updateUI() {
        const total = localData.length;
        const sent = localData.filter(i => i.synced).length;
        document.getElementById('stats').innerText = `Kayıt: ${total} | Bulut: ${sent}`;
        if(total > sent && navigator.onLine) document.getElementById('syncBtn').style.display = 'block';
        else document.getElementById('syncBtn').style.display = 'none';
    }

    function playBeep(freq) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; gain.gain.value = 0.01;
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
    updateUI();
</script>
</body>
</html>
