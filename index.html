<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bulut Sayım v16 - Barkod Odaklı</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4834d4; --success: #22a6b3; --text: #2d3436; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #636e72; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-add { background: var(--primary); }
        .btn-camera { background: #636e72; font-size: 14px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #95afc0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="reader"></div>
    <button class="btn btn-camera" onclick="toggleCamera()">📷 KAMERAYI AÇ/KAPAT</button>
    
    <div class="input-group">
        <label>📍 RAF</label>
        <input type="text" id="shelf" placeholder="Raf girin..." autocomplete="off">
    </div>

    <div class="input-group">
        <label>🏷️ BARKOD</label>
        <input type="text" id="barcode" placeholder="Barkodu okutun">
    </div>
    
    <button class="btn btn-add" onclick="processEntry()">➕ EKLE VE GÖNDER</button>

    <div class="status-bar">
        <span id="stats">Kayıt: 0 | Bulut: 0</span>
        <span id="lastScanned" style="color: var(--success); font-weight: bold;"></span>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyhJ2SvVAlUu2u3Ycgz3ERJuAL49Qn9JULPwzJWQUXg2csRYzZpVuflSU28s7TmMJ81/exec'; // Kendi URL'nizi buraya yapıştırın
    let localData = JSON.parse(localStorage.getItem('cloud_sayim_v16')) || [];
    let html5QrCode;
    let isCameraOpen = false;

    function toggleCamera() {
        if (!isCameraOpen) {
            html5QrCode = new Html5Qrcode("reader");
            
            // BARKOD FORMATLARI TANIMLANDI
            const config = { 
                fps: 20, // Daha hızlı tarama
                qrbox: { width: 280, height: 150 }, // Barkodlar için daha geniş dikdörtgen alan
                aspectRatio: 1.0
            };
            
            // Sadece belirli barkod tiplerini araması için kısıtlıyoruz (Hız kazandırır)
            const formats = [ 
                Html5QrcodeSupportedFormats.EAN_13, 
                Html5QrcodeSupportedFormats.EAN_8, 
                Html5QrcodeSupportedFormats.CODE_128, 
                Html5QrcodeSupportedFormats.UPC_A, 
                Html5QrcodeSupportedFormats.UPC_E 
            ];

            html5QrCode.start(
                { facingMode: "environment" }, 
                { ...config, formatsToSupport: formats }, 
                onScanSuccess
            ).then(() => isCameraOpen = true)
            .catch(err => alert("Hata: " + err));
        } else {
            html5QrCode.stop().then(() => {
                isCameraOpen = false;
                document.getElementById("reader").innerHTML = "";
            });
        }
    }

    function onScanSuccess(decodedText) {
        document.getElementById('barcode').value = decodedText;
        document.getElementById('lastScanned').innerText = "✓ " + decodedText;
        playBeep();
        
        // Cihaz titretme (destekleyen telefonlarda)
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function processEntry() {
        const shelf = document.getElementById('shelf').value.trim() || "Genel";
        const barcode = document.getElementById('barcode').value.trim();
        if(!barcode) return;

        const entry = { shelf, barcode, count: 1, device: "Mobil" };
        localData.push({ ...entry, synced: false });
        save();
        if(navigator.onLine) sendToCloud(entry, localData.length - 1);
        document.getElementById('barcode').value = "";
        updateUI();
    }

    async function sendToCloud(item, index) {
        try {
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
            localData[index].synced = true;
            save();
            updateUI();
        } catch (e) {}
    }

    function save() { localStorage.setItem('cloud_sayim_v16', JSON.stringify(localData)); }
    
    function updateUI() {
        const total = localData.length;
        const sent = localData.filter(i => i.synced).length;
        document.getElementById('stats').innerText = `Kayıt: ${total} | Bulut: ${sent}`;
    }

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 1000; gain.gain.value = 0.05;
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    updateUI();
</script>
</body>
</html>
